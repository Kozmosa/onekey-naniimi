<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何意味转换器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .text-area-container {
            margin-bottom: 20px;
        }

        .text-area-container label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .settings-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .settings-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #667eea;
            font-size: 1.8em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #f0f0f0;
            color: #333;
            transform: rotate(90deg);
        }

        .setting-item {
            margin-bottom: 25px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: #764ba2;
            transform: scale(1.2);
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .button-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>何意味转换器</h1>
        
        <div class="text-area-container">
            <label for="input-text">输入文本：</label>
            <textarea id="input-text" placeholder="请输入需要转换的中文文本..."></textarea>
        </div>

        <div class="text-area-container">
            <label for="output-text">输出文本：</label>
            <textarea id="output-text" placeholder="转换结果将显示在这里..." readonly></textarea>
        </div>

        <div class="button-container">
            <button class="convert-btn" onclick="convertText()">转换</button>
            <button class="settings-btn" onclick="openSettings()">设置</button>
        </div>

        <div id="loading" class="loading" style="display: none;">
            正在初始化分词库，请稍候...
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>设置</h2>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>

            <div class="setting-item">
                <label for="single-prob">单字替换概率：</label>
                <div class="slider-container">
                    <input type="range" id="single-prob" min="0" max="100" value="50" 
                           oninput="updateSliderValue('single-prob', 'single-value')">
                    <span id="single-value" class="slider-value">50%</span>
                </div>
            </div>

            <div class="setting-item">
                <label for="double-prob">双字词替换概率：</label>
                <div class="slider-container">
                    <input type="range" id="double-prob" min="0" max="100" value="50" 
                           oninput="updateSliderValue('double-prob', 'double-value')">
                    <span id="double-value" class="slider-value">50%</span>
                </div>
            </div>

            <div class="setting-item">
                <label for="triple-prob">三字词替换概率：</label>
                <div class="slider-container">
                    <input type="range" id="triple-prob" min="0" max="100" value="50" 
                           oninput="updateSliderValue('triple-prob', 'triple-value')">
                    <span id="triple-value" class="slider-value">50%</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Include nodejieba WebAssembly version or use a simple segmentation approach -->
    <script>
        // Simple Chinese word segmentation implementation
        // For a production app, you'd use a library like jieba, but for a static page,
        // we'll implement a basic dictionary-based segmentation

        // This is a simplified segmentation that works client-side
        class ChineseSegmenter {
            constructor() {
                // Common 2-character and 3-character Chinese words
                this.dict3 = new Set([
                    '中国人', '日本人', '美国人', '图书馆', '计算机', '博物馆', 
                    '大学生', '运动会', '奥运会', '世界杯', '篮球队', '足球队'
                ]);
                
                this.dict2 = new Set([
                    '今天', '明天', '昨天', '天气', '真好', '我们', '一起', '公园',
                    '中国', '日本', '美国', '世界', '你好', '再见', '谢谢', '不是',
                    '什么', '为什么', '怎么', '哪里', '这里', '那里', '时候', '时间',
                    '地方', '朋友', '学生', '老师', '医生', '警察', '工人', '农民',
                    '喜欢', '讨厌', '认为', '觉得', '知道', '明白', '理解', '学习',
                    '工作', '生活', '吃饭', '睡觉', '起床', '上班', '下班', '回家',
                    '漂亮', '美丽', '帅气', '聪明', '愚蠢', '勇敢', '懦弱', '善良',
                    '东西', '事情', '问题', '办法', '方法', '机会', '可能', '一定',
                    '应该', '必须', '可以', '能够', '愿意', '希望', '想要', '需要'
                ]);
            }

            // Check if a character is Chinese
            isChinese(char) {
                const code = char.charCodeAt(0);
                return code >= 0x4E00 && code <= 0x9FFF;
            }

            // Forward maximum matching with dictionary
            segment(text) {
                const result = [];
                let i = 0;

                while (i < text.length) {
                    const char = text[i];
                    
                    // If not Chinese, add as-is
                    if (!this.isChinese(char)) {
                        result.push(char);
                        i++;
                        continue;
                    }

                    // Try to match 3-character words first
                    if (i + 3 <= text.length) {
                        const word3 = text.substr(i, 3);
                        if (this.dict3.has(word3)) {
                            result.push(word3);
                            i += 3;
                            continue;
                        }
                    }

                    // Try to match 2-character words
                    if (i + 2 <= text.length) {
                        const word2 = text.substr(i, 2);
                        if (this.dict2.has(word2)) {
                            result.push(word2);
                            i += 2;
                            continue;
                        }
                    }

                    // Otherwise, treat as single character
                    result.push(char);
                    i++;
                }

                return result;
            }
        }

        const segmenter = new ChineseSegmenter();

        // Get probability settings
        function getProbabilities() {
            return {
                single: parseInt(document.getElementById('single-prob').value) / 100,
                double: parseInt(document.getElementById('double-prob').value) / 100,
                triple: parseInt(document.getElementById('triple-prob').value) / 100
            };
        }

        // Random replacement for single character
        function replaceSingleChar() {
            const chars = ['何', '意', '味'];
            return chars[Math.floor(Math.random() * chars.length)];
        }

        // Check if string contains only Chinese characters
        function isAllChinese(str) {
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i);
                if (code < 0x4E00 || code > 0x9FFF) {
                    return false;
                }
            }
            return true;
        }

        // Convert text based on segmentation
        function convertText() {
            const inputText = document.getElementById('input-text').value;
            if (!inputText.trim()) {
                alert('请输入文本');
                return;
            }

            const probs = getProbabilities();
            const segments = segmenter.segment(inputText);
            const result = [];

            for (const segment of segments) {
                // Only process Chinese words
                if (!isAllChinese(segment)) {
                    result.push(segment);
                    continue;
                }

                const length = segment.length;
                
                if (length === 1) {
                    // Single character - replace with random char from [何, 意, 味]
                    if (Math.random() < probs.single) {
                        result.push(replaceSingleChar());
                    } else {
                        result.push(segment);
                    }
                } else if (length === 2) {
                    // Two-character word - replace with "意味"
                    if (Math.random() < probs.double) {
                        result.push('意味');
                    } else {
                        result.push(segment);
                    }
                } else if (length === 3) {
                    // Three-character word - replace with "何意味"
                    if (Math.random() < probs.triple) {
                        result.push('何意味');
                    } else {
                        result.push(segment);
                    }
                } else {
                    // Longer words - keep as-is
                    result.push(segment);
                }
            }

            document.getElementById('output-text').value = result.join('');
        }

        // Settings modal functions
        function openSettings() {
            document.getElementById('settings-modal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
        }

        function updateSliderValue(sliderId, valueId) {
            const value = document.getElementById(sliderId).value;
            document.getElementById(valueId).textContent = value + '%';
        }

        // Close modal when clicking outside
        document.getElementById('settings-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeSettings();
            }
        });

        // Allow Enter key in input to trigger conversion (Ctrl+Enter for new line)
        document.getElementById('input-text').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                convertText();
            }
        });
    </script>
</body>
</html>
