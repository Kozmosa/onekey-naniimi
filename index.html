<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何意味转换器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .text-area-container {
            margin-bottom: 20px;
        }

        .text-area-container label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .convert-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .settings-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .settings-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #667eea;
            font-size: 1.8em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: #f0f0f0;
            color: #333;
            transform: rotate(90deg);
        }

        .setting-item {
            margin-bottom: 25px;
        }

        .setting-item label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: bold;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: #764ba2;
            transform: scale(1.2);
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }

        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .button-container {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>

    <!-- 使用 ESM 引入 jieba.js -->
    <script type="module">
        import { init, cut, ready } from "https://unpkg.com/@congcongcai/jieba.js@^0.0.3/index.js";

        // 标记初始化状态
        window.jiebaReady = false;

        // 概率设置
        window.getProbabilities = function () {
            return {
                single: parseInt(document.getElementById('single-prob').value, 10) / 100,
                double: parseInt(document.getElementById('double-prob').value, 10) / 100,
                triple: parseInt(document.getElementById('triple-prob').value, 10) / 100
            };
        };

        // 随机单字替换
        window.replaceSingleChar = function () {
            const chars = ['何', '意', '味'];
            return chars[Math.floor(Math.random() * chars.length)];
        };

        // 仅中文判断（基本区间）
        window.isAllChinese = function (str) {
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i);
                if (code < 0x4E00 || code > 0x9FFF) {
                    return false;
                }
            }
            return true;
        };

        // 转换逻辑：使用 jieba.js 的 cut 分词
        window.convertText = function () {
            if (!window.jiebaReady) {
                alert('分词库尚未初始化，请稍候...');
                return;
            }

            const inputText = document.getElementById('input-text').value;
            if (!inputText.trim()) {
                alert('请输入文本');
                return;
            }

            const probs = window.getProbabilities();
            const segments = cut(inputText); // 使用 jieba.js 分词
            const result = [];

            for (const segment of segments) {
                // 仅处理纯中文的分词
                if (!window.isAllChinese(segment)) {
                    result.push(segment);
                    continue;
                }

                const length = segment.length;

                if (length === 1) {
                    if (Math.random() < probs.single) {
                        result.push(window.replaceSingleChar());
                    } else {
                        result.push(segment);
                    }
                } else if (length === 2) {
                    if (Math.random() < probs.double) {
                        result.push('意味');
                    } else {
                        result.push(segment);
                    }
                } else if (length === 3) {
                    if (Math.random() < probs.triple) {
                        result.push('何意味');
                    } else {
                        result.push(segment);
                    }
                } else {
                    // 其他长度保持不变
                    result.push(segment);
                }
            }

            document.getElementById('output-text').value = result.join('');
        };

        // 设置弹窗
        window.openSettings = function () {
            document.getElementById('settings-modal').classList.add('active');
        };

        window.closeSettings = function () {
            document.getElementById('settings-modal').classList.remove('active');
        };

        window.updateSliderValue = function (sliderId, valueId) {
            const value = document.getElementById(sliderId).value;
            document.getElementById(valueId).textContent = value + '%';
        };

        // 页面加载后再触发初始化和事件绑定
        window.addEventListener('DOMContentLoaded', () => {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'block';

            // 初始化 jieba.js（加载 wasm 后 init）
            ready().then(() => {
                init(); // 使用默认内置词典
                window.jiebaReady = true;
                if (loading) loading.style.display = 'none';
            });

            // 点击遮罩关闭设置面板
            document.getElementById('settings-modal').addEventListener('click', function (e) {
                if (e.target === this) {
                    window.closeSettings();
                }
            });

            // Ctrl+Enter 触发转换
            document.getElementById('input-text').addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    window.convertText();
                }
            });
        });
    </script>
</head>
<body>
    <div class="container">
        <h1>何意味转换器</h1>
        
        <div class="text-area-container">
            <label for="input-text">输入文本：</label>
            <textarea id="input-text" placeholder="请输入需要转换的中文文本..."></textarea>
        </div>

        <div class="text-area-container">
            <label for="output-text">输出文本：</label>
            <textarea id="output-text" placeholder="转换结果将显示在这里..." readonly></textarea>
        </div>

        <div class="button-container">
            <button class="convert-btn" onclick="convertText()">转换</button>
            <button class="settings-btn" onclick="openSettings()">设置</button>
        </div>

        <div id="loading" class="loading">
            正在初始化分词库，请稍候...
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>你想何出怎样的意味？</h2>
                <button class="close-btn" onclick="closeSettings()">&times;</button>
            </div>

            <div class="setting-item">
                <label for="single-prob">单字替换概率：</label>
                <div class="slider-container">
                    <input type="range" id="single-prob" min="0" max="100" value="50" 
                           oninput="updateSliderValue('single-prob', 'single-value')">
                    <span id="single-value" class="slider-value">50%</span>
                </div>
            </div>

            <div class="setting-item">
                <label for="double-prob">双字词替换概率：</label>
                <div class="slider-container">
                    <input type="range" id="double-prob" min="0" max="100" value="50" 
                           oninput="updateSliderValue('double-prob', 'double-value')">
                    <span id="double-value" class="slider-value">50%</span>
                </div>
            </div>

            <div class="setting-item">
                <label for="triple-prob">三字词替换概率：</label>
                <div class="slider-container">
                    <input type="range" id="triple-prob" min="0" max="100" value="50" 
                           oninput="updateSliderValue('triple-prob', 'triple-value')">
                    <span id="triple-value" class="slider-value">50%</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
